name: Daily 今日訊號

# 每個交易日下午自動生成「今日訊號」頁並發佈到網站。
# 17:00 台灣時間（= 09:00 UTC），此時證交所當天收盤資料已公布。
# 註：GitHub 排程尖峰可能延遲數分鐘；非交易日腳本會自行判斷、無新資料則不更新。

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 生成今日訊號頁（純標準庫，免安裝）
        run: python scripts/daily_report.py
      - name: 有變更就提交並發佈
        run: |
          git config user.name "linbo-daily-bot"
          git config user.email "daily-bot@users.noreply.github.com"
          git add web/today.html
          if git diff --cached --quiet; then
            echo "今日訊號無變更（可能是非交易日或收盤資料未更新），略過提交。"
          else
            git commit -m "chore(daily): 更新今日訊號 $(date -u +%Y-%m-%d)"
            git push
            echo "已更新並發佈今日訊號。"
          fi
